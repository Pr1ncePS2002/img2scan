<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DocScan — Capture</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #14141f;
    --surface-2: #1c1c2a;
    --border: #2a2a3e;
    --text: #eaeaf2;
    --text-dim: #7a7a96;
    --accent: #3d5afe;
    --accent-soft: rgba(61,90,254,0.15);
    --green: #00e676;
    --green-soft: rgba(0,230,118,0.12);
    --amber: #ffab00;
    --red: #ff5252;
    --radius: 20px;
    --font: 'DM Sans', -apple-system, sans-serif;
    --mono: 'Space Mono', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Header ── */
  .mobile-header {
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(16px);
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(10,10,15,0.85);
  }
  .mobile-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
  }
  .mobile-logo span { color: var(--accent); }
  .mobile-logo .icon {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .conn-chip {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .conn-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--amber);
  }
  .conn-dot.ok { background: var(--green); }

  /* ── Screens ── */
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }

  /* ── Capture Screen ── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 28px;
  }

  .hero-text { text-align: center; }
  .hero-text h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .hero-text p {
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.5;
  }

  .capture-area {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .capture-btn {
    width: 100%;
    padding: 20px;
    border-radius: var(--radius);
    border: 2px dashed var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .capture-btn .emoji { font-size: 28px; }
  .capture-btn:active { transform: scale(0.97); }
  .capture-btn:hover, .capture-btn:focus {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .capture-btn.primary {
    border-style: solid;
    border-color: var(--accent);
    background: linear-gradient(135deg, var(--accent-soft), rgba(61,90,254,0.05));
  }
  .capture-btn input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    color: var(--text-dim);
    font-size: 13px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Mode Selector ── */
  .mode-selector {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 380px;
  }
  .mode-opt {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .mode-opt.active {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--accent);
  }

  /* ── Corner Selection Screen ── */
  .crop-screen {
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #000;
  }

  .crop-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
    z-index: 5;
  }
  .crop-header-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .crop-header-hint {
    font-size: 12px;
    color: var(--amber);
    font-family: var(--mono);
  }

  .crop-canvas-area {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .crop-canvas-area img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }

  /* Overlay canvas for polygon */
  #cropOverlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }

  /* Corner handles — large for mobile touch */
  .crop-handle {
    position: absolute;
    width: 44px;
    height: 44px;
    transform: translate(-50%, -50%);
    z-index: 10;
    touch-action: none;
    cursor: grab;
  }
  .crop-handle::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    border: 3px solid var(--green);
    border-radius: 50%;
    background: rgba(0, 230, 118, 0.25);
    transition: all 0.15s;
    box-shadow: 0 0 12px rgba(0, 230, 118, 0.3);
  }
  .crop-handle.dragging::before {
    width: 26px;
    height: 26px;
    background: rgba(0, 230, 118, 0.45);
    box-shadow: 0 0 24px rgba(0, 230, 118, 0.5);
  }

  /* Magnifier loupe */
  .crop-magnifier {
    position: absolute;
    width: 130px;
    height: 130px;
    border: 2px solid var(--green);
    border-radius: 50%;
    overflow: hidden;
    pointer-events: none;
    z-index: 20;
    display: none;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.5), 0 0 24px rgba(0,230,118,0.25);
  }
  .crop-magnifier.visible { display: block; }
  .crop-magnifier canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .crop-magnifier .mag-crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 24px; height: 24px;
    pointer-events: none;
  }
  .crop-magnifier .mag-crosshair::before,
  .crop-magnifier .mag-crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,82,82,0.7);
  }
  .crop-magnifier .mag-crosshair::before {
    width: 1px; height: 100%;
    left: 50%; top: 0;
  }
  .crop-magnifier .mag-crosshair::after {
    height: 1px; width: 100%;
    top: 50%; left: 0;
  }

  /* Bottom bar for crop screen */
  .crop-bottom {
    display: flex;
    gap: 12px;
    padding: 16px 20px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
    z-index: 5;
  }
  .crop-bottom .btn {
    flex: 1;
    padding: 16px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .crop-bottom .btn:active { transform: scale(0.97); }
  .crop-bottom .btn.send {
    background: var(--green);
    border-color: var(--green);
    color: #0a0a0f;
  }

  /* ── Status Messages ── */
  .status-bar {
    width: 100%;
    max-width: 380px;
  }
  .status-msg {
    padding: 14px 20px;
    border-radius: 14px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideUp 0.3s ease-out;
  }
  .status-msg.success {
    background: var(--green-soft);
    border: 1px solid rgba(0,230,118,0.25);
    color: var(--green);
  }
  .status-msg.processing {
    background: var(--accent-soft);
    border: 1px solid rgba(61,90,254,0.25);
    color: var(--accent);
  }
  .status-msg.error {
    background: rgba(255,82,82,0.1);
    border: 1px solid rgba(255,82,82,0.25);
    color: var(--red);
  }

  .mini-spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(61,90,254,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="mobile-header">
  <div class="mobile-logo">
    <div class="icon">📄</div>
    Doc<span>Scan</span>
  </div>
  <div class="conn-chip">
    <div class="conn-dot" id="connDot"></div>
    <span id="connText">Connecting</span>
  </div>
</header>

<!-- Screen 1: Capture -->
<div class="screen active" id="captureScreen">
  <div class="content">
    <div class="hero-text" id="heroText">
      <h1>Capture Document</h1>
      <p>Take a photo or upload an image of a document. You'll mark the edges before sending.</p>
    </div>

    <div class="mode-selector">
      <button class="mode-opt active" data-mode="scan" onclick="setMode('scan', this)">B&W Scan</button>
      <button class="mode-opt" data-mode="color" onclick="setMode('color', this)">Color</button>
      <button class="mode-opt" data-mode="original" onclick="setMode('original', this)">Original</button>
    </div>

    <div class="capture-area" id="captureArea">
      <label class="capture-btn primary">
        <span class="emoji">📸</span>
        Take Photo
        <input type="file" accept="image/*" capture="environment" id="cameraInput">
      </label>

      <div class="divider">or</div>

      <label class="capture-btn">
        <span class="emoji">🖼</span>
        Upload from Gallery
        <input type="file" accept="image/*" id="galleryInput">
      </label>
    </div>

    <div class="status-bar" id="statusBar"></div>
  </div>
</div>

<!-- Screen 2: Corner Selection -->
<div class="screen" id="cropScreen">
  <div class="crop-screen">
    <div class="crop-header">
      <div class="crop-header-title">Adjust Corners</div>
      <div class="crop-header-hint">Drag to refine</div>
    </div>

    <div class="crop-canvas-area" id="cropArea">
      <img id="cropImage" src="" alt="Crop">
      <canvas id="cropOverlay"></canvas>

      <!-- 4 corner handles -->
      <div class="crop-handle" id="handle0" data-idx="0"></div>
      <div class="crop-handle" id="handle1" data-idx="1"></div>
      <div class="crop-handle" id="handle2" data-idx="2"></div>
      <div class="crop-handle" id="handle3" data-idx="3"></div>

      <!-- Magnifier -->
      <div class="crop-magnifier" id="cropMag">
        <canvas id="magCanvas" width="260" height="260"></canvas>
        <div class="mag-crosshair"></div>
      </div>
    </div>

    <div class="crop-bottom">
      <button class="btn" onclick="backToCapture()">Retake</button>
      <button class="btn send" onclick="sendWithCorners()">Send to Desktop</button>
    </div>
  </div>
</div>

<script>
  // ── State ──
  let ws = null;
  let currentImageB64 = null;
  let scanMode = 'scan';

  // Corner picker state
  let cropState = null;

  // ── Parse session from URL ──
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session');

  if (!sessionId) {
    document.getElementById('heroText').innerHTML =
      `<h1>Invalid Link</h1><p>Please scan the QR code from the desktop app to get a valid link.</p>`;
    document.getElementById('captureArea').style.display = 'none';
  } else {
    connectWS();
  }

  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws?session=${sessionId}&role=mobile`);

    ws.onopen = () => {
      document.getElementById('connDot').classList.add('ok');
      document.getElementById('connText').textContent = 'Connected';
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'upload_confirmed') {
        if (data.success) {
          showStatus('✓ Document scanned successfully!', 'success');
        } else {
          showStatus(data.message || 'Processing completed', 'success');
        }
        setTimeout(() => {
          backToCapture();
        }, 2000);
      }
    };

    ws.onclose = () => {
      document.getElementById('connDot').classList.remove('ok');
      document.getElementById('connText').textContent = 'Disconnected';
      setTimeout(connectWS, 3000);
    };
  }

  // ── File Handlers ──
  document.getElementById('cameraInput').addEventListener('change', handleFile);
  document.getElementById('galleryInput').addEventListener('change', handleFile);

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 3000;
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          const scale = maxDim / Math.max(w, h);
          w = Math.round(w * scale);
          h = Math.round(h * scale);
        }

        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        const dataUrl = canvas.toDataURL('image/jpeg', 0.88);
        currentImageB64 = dataUrl.split(',')[1];

        // Go to corner selection screen
        showCropScreen(dataUrl, w, h);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  // ── Screen Navigation ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showCropScreen(dataUrl, naturalW, naturalH) {
    showScreen('cropScreen');

    const cropImg = document.getElementById('cropImage');
    cropImg.src = dataUrl;

    // Wait for image to render to get layout dimensions
    cropImg.onload = () => initCropPicker(cropImg, naturalW, naturalH);
    if (cropImg.complete && cropImg.naturalWidth) {
      initCropPicker(cropImg, naturalW, naturalH);
    }
  }

  function backToCapture() {
    showScreen('captureScreen');
    currentImageB64 = null;
    cropState = null;
    document.getElementById('statusBar').innerHTML = '';
  }

  // ── Corner Picker ──
  function initCropPicker(img, naturalW, naturalH) {
    const area = document.getElementById('cropArea');
    const overlay = document.getElementById('cropOverlay');
    const ctx = overlay.getContext('2d');

    // Get image rendered bounds
    const areaRect = area.getBoundingClientRect();
    const imgRect = img.getBoundingClientRect();

    overlay.width = areaRect.width;
    overlay.height = areaRect.height;

    // Image offset within the area (centered by object-fit)
    const ox = imgRect.left - areaRect.left;
    const oy = imgRect.top - areaRect.top;
    const iw = imgRect.width;
    const ih = imgRect.height;

    // Scale: displayed -> natural
    const sx = naturalW / iw;
    const sy = naturalH / ih;

    // Default corners: 10% inset
    const m = 0.10;
    const corners = [
      { x: ox + iw * m,       y: oy + ih * m },       // TL
      { x: ox + iw * (1 - m), y: oy + ih * m },       // TR
      { x: ox + iw * (1 - m), y: oy + ih * (1 - m) }, // BR
      { x: ox + iw * m,       y: oy + ih * (1 - m) }, // BL
    ];

    cropState = {
      corners, img, area, overlay, ctx,
      ox, oy, iw, ih, sx, sy,
      naturalW, naturalH,
      dragging: -1
    };

    positionHandles();
    drawCropPolygon();

    // Attach pointer events to each handle
    for (let i = 0; i < 4; i++) {
      const h = document.getElementById('handle' + i);
      h.onpointerdown = (e) => onCropDown(e, i);
    }

    // Move/up on the area
    area.onpointermove = onCropMove;
    area.onpointerup = onCropUp;
    area.onpointercancel = onCropUp;
  }

  function positionHandles() {
    if (!cropState) return;
    const areaRect = cropState.area.getBoundingClientRect();
    cropState.corners.forEach((c, i) => {
      const h = document.getElementById('handle' + i);
      h.style.left = c.x + 'px';
      h.style.top = c.y + 'px';
    });
  }

  function drawCropPolygon() {
    if (!cropState) return;
    const { ctx, overlay, corners } = cropState;
    ctx.clearRect(0, 0, overlay.width, overlay.height);

    // Semi-transparent fill
    ctx.beginPath();
    ctx.moveTo(corners[0].x, corners[0].y);
    for (let i = 1; i < 4; i++) ctx.lineTo(corners[i].x, corners[i].y);
    ctx.closePath();
    ctx.fillStyle = 'rgba(0, 230, 118, 0.06)';
    ctx.fill();

    // Dashed border
    ctx.strokeStyle = 'rgba(0, 230, 118, 0.65)';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 5]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Edge lines (solid, thin) connecting handles
    ctx.beginPath();
    ctx.moveTo(corners[0].x, corners[0].y);
    for (let i = 1; i < 4; i++) ctx.lineTo(corners[i].x, corners[i].y);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(0, 230, 118, 0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function onCropDown(e, idx) {
    e.preventDefault();
    e.stopPropagation();
    cropState.dragging = idx;
    const h = document.getElementById('handle' + idx);
    h.classList.add('dragging');
    h.setPointerCapture(e.pointerId);

    // Show magnifier immediately
    updateMagnifier(cropState.corners[idx].x, cropState.corners[idx].y);
  }

  function onCropMove(e) {
    if (!cropState || cropState.dragging < 0) return;
    e.preventDefault();

    const { corners, dragging, area, ox, oy, iw, ih } = cropState;
    const rect = area.getBoundingClientRect();

    // Position relative to area
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;

    // Clamp within image bounds
    x = Math.max(ox + 2, Math.min(ox + iw - 2, x));
    y = Math.max(oy + 2, Math.min(oy + ih - 2, y));

    corners[dragging].x = x;
    corners[dragging].y = y;

    // Update handle
    const h = document.getElementById('handle' + dragging);
    h.style.left = x + 'px';
    h.style.top = y + 'px';

    drawCropPolygon();
    updateMagnifier(x, y);
  }

  function onCropUp(e) {
    if (!cropState || cropState.dragging < 0) return;
    const h = document.getElementById('handle' + cropState.dragging);
    if (h) h.classList.remove('dragging');
    cropState.dragging = -1;
    hideMagnifier();
  }

  // ── Magnifier ──
  function updateMagnifier(cx, cy) {
    if (!cropState) return;
    const mag = document.getElementById('cropMag');
    const magCanvas = document.getElementById('magCanvas');
    const magCtx = magCanvas.getContext('2d');
    const { img, ox, oy, iw, ih, area } = cropState;
    const areaRect = area.getBoundingClientRect();

    mag.classList.add('visible');

    // Position: above and to the right of the point, avoiding edges
    const magSize = 130;
    let mx = cx + 40;
    let my = cy - magSize - 20;
    // If too far right, go left
    if (mx + magSize > areaRect.width) mx = cx - magSize - 40;
    // If too high, go below
    if (my < 10) my = cy + 40;
    // If too far left
    if (mx < 10) mx = 10;

    mag.style.left = mx + 'px';
    mag.style.top = my + 'px';

    // Draw zoomed view from image
    const zoom = 3.5;
    const mw = magCanvas.width;
    const mh = magCanvas.height;

    // Map display coords to image-relative
    const relX = cx - ox;
    const relY = cy - oy;

    // Source rect in natural image
    const srcX = (relX / iw) * img.naturalWidth - (mw / zoom / 2);
    const srcY = (relY / ih) * img.naturalHeight - (mh / zoom / 2);
    const srcW = mw / zoom;
    const srcH = mh / zoom;

    magCtx.clearRect(0, 0, mw, mh);

    // Clip to circle
    magCtx.save();
    magCtx.beginPath();
    magCtx.arc(mw / 2, mh / 2, mw / 2, 0, Math.PI * 2);
    magCtx.clip();
    magCtx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, mw, mh);
    magCtx.restore();
  }

  function hideMagnifier() {
    document.getElementById('cropMag').classList.remove('visible');
  }

  // ── Send with Corners ──
  function sendWithCorners() {
    if (!currentImageB64 || !ws || ws.readyState !== WebSocket.OPEN || !cropState) {
      showStatus('Not connected. Please wait...', 'error');
      return;
    }

    const { corners, ox, oy, sx, sy } = cropState;

    // Convert display coords to natural image coords
    const naturalCorners = corners.map(c => [
      Math.round((c.x - ox) * sx),
      Math.round((c.y - oy) * sy)
    ]);

    showScreen('captureScreen');
    showStatus('Sending to desktop...', 'processing');

    ws.send(JSON.stringify({
      type: 'image_upload',
      image: currentImageB64,
      corners: naturalCorners,
      filename: `capture_${Date.now()}.jpg`,
      mode: scanMode
    }));

    showStatus('Processing on desktop...', 'processing');
  }

  // ── Helpers ──
  function setMode(mode, btn) {
    scanMode = mode;
    document.querySelectorAll('.mode-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function showStatus(message, type) {
    const bar = document.getElementById('statusBar');
    const spinner = type === 'processing' ? '<div class="mini-spinner"></div>' : '';
    bar.innerHTML = `<div class="status-msg ${type}">${spinner} ${message}</div>`;
  }
</script>
</body>
</html>
